apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-advisor
  labels:
    app: ai-advisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-advisor
  template:
    metadata:
      labels:
        app: ai-advisor
    spec:
      nodeName: kevin-ubuntu
      containers:
        - name: ai-advisor
          image: ai-advisor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
